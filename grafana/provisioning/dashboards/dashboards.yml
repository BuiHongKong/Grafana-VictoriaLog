apiVersion: 1
providers:
  # ==========================================
  # Cấu hình nạp Dashboards cho PROJECT A
  # ==========================================
  - name: 'Project A Dashboards'
    folder: 'Project A'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/project-a

  # ==========================================
  # Cấu hình nạp Dashboards cho PROJECT B
  # ==========================================
  - name: 'Project B Dashboards'
    folder: 'Project B'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/project-b

  # ==========================================
  # Cấu hình nạp Dashboards cho PROJECT C
  # ==========================================
  - name: 'Project C Dashboards'
    folder: 'Project C'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/project-c

  # ==========================================
  # Cấu hình nạp Dashboard TỔNG HỢP (Global)
  # ==========================================
  - name: 'Global Dashboards'
    folder: 'Global'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/global
