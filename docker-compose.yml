version: '3.8'

services:
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    ports:
      - "9428:9428"
    volumes:
      - victorialogs-data:/vlogsdata
    command:
      - "-storageDataPath=/vlogsdata"
      - "-httpListenAddr=:9428"
    networks:
      - logging-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_PLUGINS_PREINSTALL=victoriametrics-logs-datasource
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victorialogs
    networks:
      - logging-network

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:latest
    container_name: fluent-bit
    ports:
      - "8888:8888"
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
    depends_on:
      - victorialogs
    networks:
      - logging-network

  golang-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: golang-app
    depends_on:
      - fluent-bit
    networks:
      - logging-network

volumes:
  victorialogs-data:

networks:
  logging-network:
    driver: bridge
