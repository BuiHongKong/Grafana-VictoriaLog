[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers_custom.conf

[INPUT]
    Name         tail
    Path         /var/log/app/app.log
    Parser       json_parser
    Tag          app.logs
    Read_from_Head true

[OUTPUT]
    Name         http
    Match        app.logs
    Host         victorialogs
    Port         9428
    URI          /insert/jsonline?_stream_fields=job,env&_msg_field=message&_time_field=time
    Format       json_lines
