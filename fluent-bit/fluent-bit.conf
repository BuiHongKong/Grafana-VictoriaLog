[SERVICE]
    Flush        1
    Log_Level    info

[INPUT]
    Name         http
    Listen       0.0.0.0
    Port         8888
    # Mọi request POST đến URL nào sẽ tự động được gán Tag bằng URL đó (vd: /app.logs -> Tag: app.logs)

[OUTPUT]
    Name         http
    Match        app.logs
    Host         victorialogs
    Port         9428
    URI          /insert/jsonline?_stream_fields=project,env&_msg_field=message&_time_field=time
    Format       json_lines
